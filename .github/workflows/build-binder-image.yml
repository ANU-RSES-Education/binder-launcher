name: Build Binder image

# Builds container/Dockerfile.source and publishes it to
# ghcr.io/anu-rses-education/binder-launcher:latest. Binder reads
# this repo's .binder/Dockerfile (one-line `FROM` on this image) so
# mybinder.org pulls a pre-built image rather than building anything
# locally on its overloaded shared infra.
#
# Image name follows the launcher repo so the auto-issued
# GITHUB_TOKEN can publish without manual cross-repo access grants.

on:
  push:
    branches: [main]
    paths:
      - container/**
      - .github/workflows/build-binder-image.yml
  workflow_dispatch:

# So multiple rapid pushes don't waste CI minutes racing each other.
concurrency:
  group: binder-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image name
        id: img
        # `${GITHUB_REPOSITORY,,}` lower-cases owner/repo. So this image is
        # automatically `ghcr.io/anu-rses-education/binder-launcher` — i.e.,
        # the GHCR package "owned" by this repo, which GITHUB_TOKEN can
        # always write to without manual access-grant steps.
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/Dockerfile.source
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
