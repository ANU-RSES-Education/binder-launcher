name: Build Binder image

# Builds container/Dockerfile.source and publishes it to
# ghcr.io/anu-rses-education/emsc-2022:latest.
#
# This image is the shared ANU-RSES Binder runtime — it is course-neutral.
# Image name `emsc-2022` is historical (it was first built for that course);
# leaving as-is for now to avoid a public-visibility flip on a renamed
# package. Worth a deliberate rename pass eventually.

on:
  push:
    branches: [main]
    paths:
      - container/**
      - .github/workflows/build-binder-image.yml
  workflow_dispatch:

# So multiple rapid pushes don't waste CI minutes racing each other.
concurrency:
  group: binder-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Hardcoded image name for transition continuity — see header note.
          # When renaming the image, change this and the launcher's
          # .binder/Dockerfile FROM line in the same commit, then flip
          # public visibility on the new GHCR package.
          images: ghcr.io/anu-rses-education/emsc-2022
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/Dockerfile.source
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
