# Conda environment for the shared ANU-RSES Binder image.
#
# Read at image-build time by container/Dockerfile.source (via
# `micromamba install -n base -f /tmp/env.yml`). NOT read by Binder
# directly — Binder reads .binder/Dockerfile which `FROM`s the
# pre-built image. This file is the canonical list of runtime deps;
# edit here and CI rebuilds the image.
#
# Package list was derived from a scan of `import` statements across
# every notebook under EMSC-2022/Notebooks/; the counts next to each
# package record how many notebooks use it (as of the scan commit).
# Keep explicit rather than relying on transitive deps so we don't
# lose a package silently when a parent changes.
name: rses_binder_base
channels:
  - conda-forge
dependencies:
  - python=3.11
  - jupyterlab>=4.1
  - mpmath<=1.3
  - mesalib
  - pytest

  # Core scientific stack
  - numpy           # 59 notebooks
  - scipy           # 8
  - sympy           # 1
  - h5py
  - matplotlib      # 54 — listed explicitly (was coming transitively via obspy)
  # pin below 3.0 — pandas 3.x removed `delim_whitespace` from read_csv()
  # and breaks notebooks. Drop pin once notebooks are fully migrated to sep=r'\s+'.
  - pandas<3        # 16

  # Geoscience / seismology / mapping
  - obspy           # 28
  - cartopy         # 62 — pulls in geos, proj, shapely; biggest single new dep
  - xarray          # 10
  - stripy          # 6 — spherical meshes
  - owslib          # 4 — OGC web-services client

  # Visualisation
  - pyvista
  - altair          # 4 — declarative charts
  - plotly          # 4
  - bqplot          # 2 — Jupyter-native plotting
  - folium          # 1 — leaflet-based maps (static)
  - ipyleaflet      # 1 — leaflet widget
  - ipycanvas       # 1

  # Misc
  - ipywidgets      # 3 — also needed by bqplot/plotly interactive backends
  - networkx        # 1
  - lxml            # 2
  - pillow          # 2 — PIL

  - pip
  - pip:
    - gmsh
    - jupytext>=1.16.1
    - pygments>=2.17.0
    - trame-vtk
    - trame-vuetify
    # Vega sample datasets — pip-only, small
    - vega_datasets
    # nbgitpuller: pulls notebooks into the running container at launch time
    # via a `git-pull` URL path, so this image doesn't need to be rebuilt
    # when notebook content changes, and it can serve multiple courses.
    - nbgitpuller
